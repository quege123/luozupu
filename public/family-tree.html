}

function renderWorshipHall(query) {
  var el = document.getElementById('worshipBody');
  if (query !== undefined) _worshipSearchQuery = query;
  query = _worshipSearchQuery;
  var deceased = getDeceasedPeople();
  
  // 搜索过滤
  if (query && query.trim()) {
    var q = query.trim().toLowerCase();
    deceased = deceased.filter(function(p) {
      return p.name.toLowerCase().includes(q) ||
             (p.orderLabel && p.orderLabel.toLowerCase().includes(q)) ||
             (getZibei(p.gen) && getZibei(p.gen).includes(q)) ||
             ('第'+p.gen+'世').includes(q);
    });
  }
  
  var html = '';
  html += '<div class="worship-hall-title">🏮 澳峰罗氏云祠堂</div>';
  html += '<div class="worship-hall-sub">慎终追远 · 民德归厚</div>';
  
  // 节气提醒
  var tip = getSeasonalTip();
  if (tip) {
    html += '<div class="seasonal-tip">';
    html += '<div class="st-icon">'+tip.icon+'</div>';
    html += '<div class="st-text">'+tip.text+'</div>';
    html += '<div class="st-sub">'+tip.sub+'</div>';
    html += '</div>';
  }
  
  // 统计
  var totalWorships = getWorshipData().length;
  html += '<div class="worship-total">累计祭拜 '+totalWorships+' 次</div>';
  
  // 搜索框
  html += '<div class="worship-search">';
  html += '<input type="text" id="worshipSearchInput" placeholder="🔍 搜索先人姓名/字辈/世次..." value="'+(query||'').replace(/"/g,'&quot;')+'" oninput="onWorshipSearch(this.value)">';
  if (query && query.trim()) {
    html += '<span class="ws-clear" onclick="renderWorshipHall(\'\')">×</span>';
  }
  html += '</div>';
  
  if (deceased.length === 0) {
    html += '<div style="text-align:center;color:#BCAAA4;padding:30px 0;font-size:14px">未找到匹配的先人</div>';
  } else {
    if (query && query.trim()) {
      html += '<div style="text-align:center;color:#8D6E63;font-size:11px;margin-bottom:8px">找到 '+deceased.length+' 位先人</div>';
    }
    // 牌位网格
    html += '<div class="tablet-grid">';
    deceased.forEach(function(p) {
      var worshipCount = getWorshipData().filter(function(w) { return w.personId === p.id; }).length;
      var photoStyle = p.photo ? 'background-image:url('+p.photo+')' : '';
      html += '<div class="tablet-card" onclick="openWorshipPerson(&#39;'+p.id+'&#39;)">';
      html += '<div class="t-photo" style="'+photoStyle+'"></div>';
      html += '<div class="t-name">'+p.name+'</div>';
      html += '<div class="t-gen">第'+p.gen+'世['+getZibei(p.gen)+']</div>';
      if (worshipCount > 0) html += '<div class="t-count">🕯️ '+worshipCount+'次</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  
  el.innerHTML = html;
  // 聚焦搜索框
  var searchInput = document.getElementById('worshipSearchInput');
  if (searchInput && query) searchInput.focus();
}

function onWorshipSearch(val) {
  // 防抖
  clearTimeout(window._worshipSearchTimer);
  window._worshipSearchTimer = setTimeout(function() {
    renderWorshipHall(val);
  }, 300);
}

function openWorshipPerson(id) {
  currentWorshipPerson = id;
  var p = peopleMap[id];
  if (!p) return;
  
  var el = document.getElementById('worshipBody');
  var worshipCount = getWorshipData().filter(function(w) { return w.personId === p.id; }).length;
  var personWorships = getWorshipData().filter(function(w) { return w.personId === p.id; });
  
  var photoStyle = p.photo ? 'background-image:url('+p.photo+')' : '';
  var html = '';
  html += '<div class="wp-back" onclick="renderWorshipHall()">← 返回祠堂</div>';
  html += '<div class="worship-person">';
  html += '<div class="wp-photo" style="'+photoStyle+'"></div>';
  html += '<div class="wp-name">'+p.name+'</div>';
  html += '<div class="wp-info">第'+p.gen+'世['+getZibei(p.gen)+'] '+(p.orderLabel||'')+'</div>';
  
  var dates = [];
  if (p.birth) dates.push('生：'+formatDate(p.birth));
  if (p.death) dates.push('卒：'+formatDate(p.death));
  if (dates.length > 0) html += '<div class="wp-dates">'+dates.join(' | ')+'</div>';
  if (p.wife) html += '<div class="wp-info" style="color:#FFCDD2">配 '+p.wife+'</div>';
  
  html += '</div>';
  
  // 祭品台
  html += '<div class="offer-table">';
  html += '<button class="offer-btn" onclick="doWorship('+id+',\'incense\')">🕯️<span>点烛</span></button>';
  html += '<button class="offer-btn" onclick="doWorship('+id+',\'flower\')">🪷<span>献花</span></button>';
  html += '<button class="offer-btn" onclick="doWorship('+id+',\'bow\')">🙏<span>鞠躬</span></button>';
  html += '<button class="offer-btn" onclick="doWorship('+id+',\'bell\')">🔔<span>鸣钟</span></button>';
  html += '</div>';
  
  // 祭拜次数
  html += '<div class="worship-total">🕯️ 已祭拜 '+worshipCount+' 次</div>';
  
  // 祭拜记录
  if (personWorships.length > 0) {
    html += '<div class="worship-log">';
    html += '<div class="worship-log-title">📜 祭拜记录</div>';
    var recent = personWorships.slice(-20).reverse();
    recent.forEach(function(w) {
      var actionLabels = {incense:'🕯️ 点烛', flower:'🪷 献花', bow:'🙏 鞠躬', bell:'🔔 鸣钟'};
      var t = new Date(w.time);
      html += '<div class="worship-log-item"><span class="wlb-name">'+w.name+'</span> <span class="wlb-action">'+(actionLabels[w.action]||w.action)+'</span> <span class="wlb-time">'+t.toLocaleDateString('zh-CN')+' '+t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})+'</span></div>';
    });
    html += '</div>';
  }
  
  el.innerHTML = html;
  
  // 播放钟声（Web Audio API）
}

function doWorship(personId, action) {
  var name = currentUser ? currentUser.username : '访客';
  var record = {
    personId: personId,
    action: action,
    name: name,
    time: new Date().toISOString()
  };
  getWorshipData().push(record);
  saveWorshipData();
  
  // 动画效果
  if (action === 'incense') {
    var btn = event.target.closest('.offer-btn');
    if (btn) {
      btn.classList.add('candle-glow');
      setTimeout(function() { btn.classList.remove('candle-glow'); }, 2000);
    }
    playWorshipSound(800, 0.3);
  } else if (action === 'bell') {
    var btn = event.target.closest('.offer-btn');
    if (btn) {
      btn.classList.add('bell-ring');
      setTimeout(function() { btn.classList.remove('bell-ring'); }, 1500);
    }
    playWorshipSound(1200, 0.5);
  } else if (action === 'bow') {
    var person = document.querySelector('.worship-person');
    if (person) {
      person.classList.add('bow-anim');
      setTimeout(function() { person.classList.remove('bow-anim'); }, 1000);
    }
  } else if (action === 'flower') {
    // 飘花效果
    var area = document.querySelector('.offer-table');
    if (area) {
      for (var i = 0; i < 3; i++) {
        var petal = document.createElement('div');
        petal.className = 'flower-float';
        petal.textContent = '🪷';
        petal.style.cssText = 'position:absolute;font-size:20px;left:'+(40+Math.random()*20)+'%;top:'+(Math.random()*10)+'px;';
        area.style.position = 'relative';
        area.appendChild(petal);
        setTimeout(function(el) { el.remove(); }, 2500, petal);
      }
    }
  }
  
  // 刷新页面
  setTimeout(function() {
    openWorshipPerson(personId);
  }, 600);
}

function playWorshipSound(freq, duration) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.value = 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}


// ============ 聊天室（族谱茶室） ============
function getChatMessages() {
  if (!DATA.messages) DATA.messages = [];
  return DATA.messages;
}
function saveChatMessages() {
  saveData(); // 走云端同步
}

const CHAT_ROLE_COLORS = {
  admin: '#f44336',
  sub_admin: '#FF9800',
  member: '#4CAF50',
  guest: '#9E9E9E'
};

function openChat() {
  document.getElementById('chatModal').classList.add('open');
  renderChat();
  // 滚动到底部
  setTimeout(() => {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
  }, 50);
  // 清除未读
  const badge = document.getElementById('chatBadge');
  badge.style.display = 'none';
  localStorage.setItem('chatLastRead', Date.now().toString());
}

function closeChat() {
  document.getElementById('chatModal').classList.remove('open');
}

function chatKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  
  const name = currentUser ? currentUser.username : '游客';
  const role = currentUser ? currentUser.role : 'guest';
  const personId = currentUser ? currentUser.personId : null;
  
  const msg = {
    id: Date.now(),
    name,
    role,
    personId,
    text,
    time: new Date().toISOString()
  };
  
  getChatMessages().push(msg);
  saveChatMessages();
  
  input.value = '';
  input.style.height = 'auto';
  renderChat();
  
  // 滚动到底部
  setTimeout(() => {
    const el = document.getElementById('chatMessages');
    el.scrollTop = el.scrollHeight;
  }, 50);
}

function renderChat() {
  const messages = getChatMessages();
  const el = document.getElementById('chatMessages');
  const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.role === 'sub_admin');
  const myName = currentUser ? currentUser.username : '';
  
  if (messages.length === 0) {
    el.innerHTML = '<div class="chat-empty">🍵 欢迎来到族谱茶室<br>大家可以在这里交流互动</div>';
    return;
  }
  
  let html = '';
  let lastDate = '';
  
  messages.forEach(msg => {
    // 日期分隔线
    const msgDate = new Date(msg.time);
    const dateStr = msgDate.toLocaleDateString('zh-CN');
    if (dateStr !== lastDate) {
      html += `<div class="chat-date-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }
    
    const isSelf = msg.name === myName;
    const color = CHAT_ROLE_COLORS[msg.role] || '#9E9E9E';
    const initial = msg.name.charAt(0);
    const timeStr = msgDate.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    
    html += `<div class="chat-msg${isSelf ? ' self' : ''}">`;
    html += `<div class="chat-avatar" style="background:${color}">${initial}</div>`;
    html += '<div class="chat-bubble">';
    if (!isSelf) html += `<div class="cb-name" style="color:${color}">${msg.name}</div>`;
    html += `<div class="cb-text">${escapeHtml(msg.text)}</div>`;
    html += `<div class="cb-time">${timeStr}</div>`;
    if (isAdmin) {
      html += `<button class="cb-del" onclick="deleteChatMsg('${msg.id}')" title="删除">✕</button>`;
    }
    html += '</div></div>';
  });
  
  el.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function deleteChatMsg(id) {
  if (!confirm('确定删除此消息？')) return;
  DATA.messages = getChatMessages().filter(m => m.id !== id);
  saveChatMessages();
  renderChat();
}

// 检查新消息红点
function checkChatBadge() {
  const lastRead = parseInt(localStorage.getItem('chatLastRead') || '0');
  const messages = getChatMessages();
  const newCount = messages.filter(m => new Date(m.time).getTime() > lastRead).length;
  const badge = document.getElementById('chatBadge');
  if (newCount > 0 && !document.getElementById('chatModal').classList.contains('open')) {
    badge.textContent = newCount > 9 ? '9+' : newCount;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// 定期刷新聊天消息（打开时每10秒）
setInterval(() => {
  if (document.getElementById('chatModal').classList.contains('open')) {
    // 仅刷新内容，不滚动（除非在底部）
    const el = document.getElementById('chatMessages');
    const isAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
    const oldLen = getChatMessages().length;
    // 如果云端有新消息，loadData后会更新DATA.messages
    // 这里简单重新渲染
    renderChat();
    if (isAtBottom) {
      el.scrollTop = el.scrollHeight;
    }
  }
  checkChatBadge();
}, 10000);

// 初始化红点
checkChatBadge();

</script>
